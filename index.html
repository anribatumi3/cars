<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автосалон InterPlay — Каталог</title>
    <style>
        body {
            background-color: #0b0c16;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #e51b24;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 28px;
        }

        /* Панель фильтров в стиле Fletcher Wiki */
        .filters-panel {
            background-color: #141622;
            border: 2px solid #222538;
            border-radius: 14px;
            padding: 20px;
            max-width: 1360px;
            margin: 0 auto 30px auto;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .filter-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-item label {
            font-size: 12px;
            color: #a3a7c2;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        /* Стилизация селектов и инпутов */
        .filter-select, .search-input {
            width: 100%;
            padding: 12px 15px;
            background-color: #1c1e2f;
            border: 1px solid #2d314d;
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .filter-select:focus, .search-input:focus {
            border-color: #e51b24;
        }

        /* Стилизация ползунков (Range) */
        .range-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .range-slider {
            flex-grow: 1;
            accent-color: #e51b24;
            cursor: pointer;
        }

        .range-value {
            font-size: 13px;
            color: #ff9800;
            font-weight: bold;
            min-width: 100px;
            text-align: right;
        }

        #loader {
            text-align: center;
            font-size: 18px;
            color: #72768d;
            margin-top: 50px;
        }

        /* Сетка каталога */
        .catalog-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Карточки */
        .car-card {
            background-color: #141622;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
            border: 2px solid #222538;
            display: flex;
            flex-direction: column;
        }

        .car-card.hidden {
            display: none !important;
        }

        .car-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(229, 27, 36, 0.25);
            border-color: #e51b24;
        }

        .car-card.premium-card {
            border-color: #9c27b0;
        }
        .car-card.premium-card:hover {
            box-shadow: 0 12px 24px rgba(156, 39, 176, 0.35);
            border-color: #e040fb;
        }

        .car-image {
            width: 100%;
            height: 180px;
            background-color: #0f101a;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .car-image img {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
        }

        .badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background-color: #e51b24;
            color: white;
            padding: 5px 12px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 20px;
            text-transform: uppercase;
        }

        .premium-card .badge {
            background-color: #9c27b0;
        }

        .car-info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .car-name {
            font-size: 22px;
            font-weight: bold;
            margin: 0 0 3px 0;
        }

        .real-name-label {
            font-size: 11px;
            color: #72768d;
            margin: 0;
            text-transform: uppercase;
        }

        .real-name {
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            margin: 0 0 8px 0;
        }

        .dealership {
            font-size: 13px;
            color: #ff9800;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .car-specs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 13px;
            color: #a3a7c2;
            margin-bottom: 20px;
            background: #1c1e2f;
            padding: 12px;
            border-radius: 10px;
        }

        .spec-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .price-container {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            border-radius: 8px;
        }

        .price-row.main-price {
            background: rgba(229, 27, 36, 0.1);
            border-left: 4px solid #e51b24;
        }

        .premium-card .price-row.main-price {
            background: rgba(156, 39, 176, 0.15);
            border-left: 4px solid #9c27b0;
        }

        .price-row.gos-price {
            background: rgba(114, 118, 141, 0.1);
            border-left: 4px solid #56596e;
        }

        .price-label {
            font-size: 11px;
            color: #a3a7c2;
            text-transform: uppercase;
            font-weight: bold;
        }

        .price-value {
            font-size: 16px;
            font-weight: bold;
        }

        .premium-card .main-price .price-value {
            color: #e040fb;
        }
    </style>
</head>
<body>

    <h1>Автосалон InterPlay — Каталог</h1>
    
    <div class="filters-panel">
        <div class="filters-grid">
            <div class="filter-item">
                <label>Поиск транспорта</label>
                <input type="text" id="searchInput" class="search-input" placeholder="Введите название...">
            </div>

            <div class="filter-item">
                <label>Автосалон</label>
                <select id="dealerFilter" class="filter-select">
                    <option value="all">Все автосалоны</option>
                </select>
            </div>

            <div class="filter-item">
                <label>Сортировка</label>
                <select id="sortFilter" class="filter-select">
                    <option value="none">Без сортировки</option>
                    <option value="alpha-asc">Алфавит: А -> Я</option>
                    <option value="alpha-desc">Алфавит: Я -> А</option>
                    <option value="price-asc">Цена: По возрастанию</option>
                    <option value="price-desc">Цена: По убыванию</option>
                    <option value="gos-asc">Гос. цена: По возрастанию</option>
                    <option value="gos-desc">Гос. цена: По убыванию</option>
                </select>
            </div>

            <div class="filter-item">
                <label>Вместимость багажника</label>
                <select id="baggageFilter" class="filter-select">
                    <option value="all">Любой багажник</option>
                </select>
            </div>

            <div class="filter-item">
                <label>Топливный бак</label>
                <select id="tankFilter" class="filter-select">
                    <option value="all">Любой объём</option>
                </select>
            </div>
        </div>

        <div class="filters-grid">
            <div class="filter-item">
                <label>Максимальная скорость</label>
                <div class="range-container">
                    <input type="range" id="speedSlider" class="range-slider" min="0" max="500" value="0">
                    <span id="speedSliderVal" class="range-value">От 0 км/ч</span>
                </div>
            </div>

            <div class="filter-item">
                <label>Макс. цена салона ($)</label>
                <div class="range-container">
                    <input type="range" id="priceSlider" class="range-slider" min="0" max="10000000" value="10000000">
                    <span id="priceSliderVal" class="range-value">До 10M $</span>
                </div>
            </div>
        </div>
    </div>
    
    <div id="loader">Загрузка базы данных машин...</div>
    <div class="catalog-container" id="catalog"></div>

    <script>
        const SPREADSHEET_ID = '1IFuVKUjeH_ebP5Djnx9egafM5sj58aLMuRLRafjn8kc';
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0`;

        let allCars = [];

        // Элементы управления
        const searchInput = document.getElementById('searchInput');
        const dealerFilter = document.getElementById('dealerFilter');
        const sortFilter = document.getElementById('sortFilter');
        const baggageFilter = document.getElementById('baggageFilter');
        const tankFilter = document.getElementById('tankFilter');
        const speedSlider = document.getElementById('speedSlider');
        const speedSliderVal = document.getElementById('speedSliderVal');
        const priceSlider = document.getElementById('priceSlider');
        const priceSliderVal = document.getElementById('priceSliderVal');

        // Умная функция для очистки цен от копеек (,00) и конвертации в чистое число
        function cleanPrice(priceRaw) {
            let str = priceRaw.trim();
            if (!str || str === '0' || str.toLowerCase() === 'не продается') return 0;
            
            // Если есть копейки через запятую или точку (например ,00 или .00), отрезаем их
            if (str.includes(',')) {
                str = str.split(',')[0];
            } else if (str.includes('.')) {
                str = str.split('.')[0];
            }
            
            // Убираем всё, кроме цифр
            return parseInt(str.replace(/[^0-9]/g, '')) || 0;
        }

        fetch(url)
            .then(res => {
                if (!res.ok) throw new Error('Ошибка сети');
                return res.text();
            })
            .then(csvText => {
                if (csvText.includes('<!DOCTYPE html>') || csvText.includes('login')) {
                    throw new Error('Доступ ограничен');
                }

                const rows = parseCSV(csvText);
                const catalog = document.getElementById('catalog');
                document.getElementById('loader').style.display = 'none';

                const dealerships = new Set();
                const baggageCaps = new Set();
                const tankCaps = new Set();
                let maxTableSpeed = 0;
                let maxTablePrice = 0;

                for (let i = 1; i < rows.length; i++) {
                    const cells = rows[i];
                    if (!cells || cells.length < 11 || !cells[0]) continue; 

                    const name = cells[0].trim();              
                    const realName = cells[1].trim();          
                    const carClass = cells[2].trim();          
                    const rawSpeed = cells[3].trim();             
                    const acceleration = cells[4].trim();      
                    const handling = cells[5].trim();          
                    const rawSlots = cells[6].trim();             
                    const rawTank = cells[7].trim();              
                    const fuelConsumption = cells[8].trim();   
                    const dealership = cells[9].trim();        
                    let priceStr = cells[10].trim();              
                    let gosPriceStr = cells[11] ? cells[11].trim() : '0'; 

                    if (priceStr === '' || priceStr === '0') priceStr = 'Не продается';

                    // Преобразование характеристик в числа
                    const numSpeed = parseInt(rawSpeed.replace(/[^0-9]/g, '')) || 0;
                    const numSlots = parseInt(rawSlots.replace(/[^0-9]/g, '')) || 0;
                    const numTank = parseInt(rawTank.replace(/[^0-9]/g, '')) || 0;

                    if (numSpeed > maxTableSpeed) maxTableSpeed = numSpeed;

                    // Безопасный парсинг цен с отсечением копеек
                    let isPremiumCurrency = false;
                    let numPrice = 0;
                    const checkPrice = priceStr.toLowerCase();
                    
                    if (checkPrice.includes('coin') || checkPrice.includes('ic') || checkPrice.includes('кои') || checkPrice.includes('mc')) {
                        isPremiumCurrency = true;
                    } else if (priceStr !== 'Не продается') {
                        numPrice = cleanPrice(priceStr);
                        if (numPrice > maxTablePrice) maxTablePrice = numPrice;
                        priceStr = numPrice.toLocaleString('ru-RU') + ' $';
                    }

                    let numGosPrice = cleanPrice(gosPriceStr);
                    if (!gosPriceStr.toLowerCase().includes('coin') && !gosPriceStr.toLowerCase().includes('ic') && numGosPrice > 0) {
                        gosPriceStr = numGosPrice.toLocaleString('ru-RU') + ' $';
                    }

                    if (dealership) dealerships.add(dealership);
                    if (rawSlots) baggageCaps.add(numSlots);
                    if (rawTank) tankCaps.add(numTank);

                    const imgUrl = `https://via.placeholder.com/260x140/0f101a/ffffff?text=${encodeURIComponent(name)}`;
                    const card = document.createElement('div');
                    card.className = 'car-card';
                    if (isPremiumCurrency) card.classList.add('premium-card');

                    card.innerHTML = `
                        <div class="car-image">
                            <img src="${imgUrl}" alt="${name}">
                            <div class="badge">${carClass}</div>
                        </div>
                        <div class="car-info">
                            <div class="car-name">${name}</div>
                            <p class="real-name-label">Реальное название</p>
                            <div class="real-name">${realName ? realName : '—'}</div>
                            <div class="dealership">📍 ${dealership}</div>
                            
                            <div class="car-specs">
                                <div class="spec-item">⚡ Скор: ${rawSpeed}</div>
                                <div class="spec-item">🚀 Ускор: ${acceleration}</div>
                                <div class="spec-item">🕹️ Управл: ${handling}</div>
                                <div class="spec-item">🎒 Багаж: ${rawSlots}</div>
                                <div class="spec-item">⛽ Бак: ${rawTank}</div>
                                <div class="spec-item">📉 Расход: ${fuelConsumption}</div>
                            </div>

                            <div class="price-container">
                                <div class="price-row main-price">
                                    <span class="price-label">Цена в салоне:</span>
                                    <span class="price-value">${priceStr}</span>
                                </div>
                                <div class="price-row gos-price">
                                    <span class="price-label">Слив в гос:</span>
                                    <span class="price-value">${gosPriceStr}</span>
                                </div>
                            </div>
                        </div>
                    `;

                    allCars.push({
                        element: card,
                        name: name.toLowerCase(),
                        realName: realName.toLowerCase(),
                        dealer: dealership,
                        speed: numSpeed,
                        baggage: numSlots,
                        tank: numTank,
                        price: numPrice,
                        gosPrice: numGosPrice,
                        isPremium: isPremiumCurrency
                    });
                }

                setupFilterOptions(dealerships, baggageCaps, tankCaps, maxTableSpeed, maxTablePrice);
                renderCatalog();
            })
            .catch(err => {
                console.error(err);
                document.getElementById('loader').innerHTML = `<div style="color:#ef5350;">Ошибка подключения к данным. Убедитесь в публикации Лист1 (CSV).</div>`;
            });

        function setupFilterOptions(dealers, baggage, tanks, maxSpeed, maxPrice) {
            Array.from(dealers).sort().forEach(d => {
                dealerFilter.innerHTML += `<option value="${d}">${d}</option>`;
            });
            Array.from(baggage).sort((a,b)=>a-b).forEach(b => {
                baggageFilter.innerHTML += `<option value="${b}">${b} кг / слот</option>`;
            });
            Array.from(tanks).sort((a,b)=>a-b).forEach(t => {
                tankFilter.innerHTML += `<option value="${t}">${t} л</option>`;
            });

            speedSlider.max = maxSpeed;
            speedSlider.value = 0;
            speedSliderVal.innerText = `От 0 км/ч`;

            priceSlider.max = maxPrice;
            priceSlider.value = maxPrice;
            priceSliderVal.innerText = `До ${maxPrice.toLocaleString('ru-RU')} $`;
        }

        [searchInput, dealerFilter, sortFilter, baggageFilter, tankFilter].forEach(el => {
            el.addEventListener('input', renderCatalog);
        });

        speedSlider.addEventListener('input', (e) => {
            speedSliderVal.innerText = `От ${e.target.value} км/ч`;
            renderCatalog();
        });

        priceSlider.addEventListener('input', (e) => {
            priceSliderVal.innerText = `До ${parseInt(e.target.value).toLocaleString('ru-RU')} $`;
            renderCatalog();
        });

        function renderCatalog() {
            const query = searchInput.value.trim().toLowerCase();
            const selectedDealer = dealerFilter.value;
            const selectedBaggage = baggageFilter.value;
            const selectedTank = tankFilter.value;
            const minSpeed = parseInt(speedSlider.value);
            const maxPrice = parseInt(priceSlider.value);
            const sortType = sortFilter.value;

            allCars.forEach(car => {
                const matchesSearch = car.name.includes(query) || car.realName.includes(query);
                const matchesDealer = selectedDealer === 'all' || car.dealer === selectedDealer;
                const matchesBaggage = selectedBaggage === 'all' || car.baggage === parseInt(selectedBaggage);
                const matchesTank = selectedTank === 'all' || car.tank === parseInt(selectedTank);
                const matchesSpeed = car.speed >= minSpeed;
                const matchesPrice = car.isPremium || car.price === 0 || car.price <= maxPrice;

                if (matchesSearch && matchesDealer && matchesBaggage && matchesTank && matchesSpeed && matchesPrice) {
                    car.element.classList.remove('hidden');
                } else {
                    car.element.classList.add('hidden');
                }
            });

            let sortedCars = [...allCars];

            if (sortType === 'alpha-asc') {
                sortedCars.sort((a, b) => a.name.localeCompare(b.name));
            } else if (sortType === 'alpha-desc') {
                sortedCars.sort((a, b) => b.name.localeCompare(a.name));
            } else if (sortType === 'price-asc') {
                sortedCars.sort((a, b) => a.price - b.price);
            } else if (sortType === 'price-desc') {
                sortedCars.sort((a, b) => b.price - a.price);
            } else if (sortType === 'gos-asc') {
                sortedCars.sort((a, b) => a.gosPrice - b.gosPrice);
            } else if (sortType === 'gos-desc') {
                sortedCars.sort((a, b) => b.gosPrice - a.gosPrice);
            }

            const catalog = document.getElementById('catalog');
            sortedCars.forEach(car => catalog.appendChild(car.element));
        }

        function parseCSV(text) {
            let lines = text.split(/\r\n|\n/);
            let result = [];
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (!line) continue;
                
                let row = [];
                let inQuotes = false;
                let currentCell = '';
                
                for (let j = 0; j < line.length; j++) {
                    let char = line[j];
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        row.push(currentCell);
                        currentCell = '';
                    } else {
                        currentCell += char;
                    }
                }
                row.push(currentCell);
                result.push(row);
            }
            return result;
        }
    </script>
</body>
</html>
