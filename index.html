<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автосалон InterPlay</title>
    <style>
        body {
            background-color: #0b0c16;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #e51b24;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #loader {
            text-align: center;
            font-size: 18px;
            color: #72768d;
            margin-top: 50px;
        }

        .catalog-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .car-card {
            background-color: #141622;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #222538;
            display: flex;
            flex-direction: column;
        }

        .car-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(229, 27, 36, 0.2);
            border-color: #e51b24;
        }

        .car-image {
            width: 100%;
            height: 180px;
            background-color: #0f101a;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .car-image img {
            max-width: 90%;
            max-height: 85%;
            object-fit: contain;
        }

        .badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background-color: #e51b24;
            color: white;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 6px;
            text-transform: uppercase;
        }

        .car-info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .car-name {
            font-size: 20px;
            font-weight: bold;
            margin: 0 0 2px 0;
        }

        .real-name {
            color: #72768d;
            font-size: 14px;
            margin: 0 0 4px 0;
        }

        .dealership {
            font-size: 12px;
            color: #ff9800; /* Оранжевый цвет для автосалона */
            margin-bottom: 15px;
            font-weight: 600;
        }

        /* Блок технических характеристик */
        .car-specs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 13px;
            color: #a3a7c2;
            margin-bottom: 20px;
            background: #1c1e2f;
            padding: 12px;
            border-radius: 8px;
        }

        .spec-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Блок с ценами */
        .price-container {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-radius: 6px;
        }

        /* Стиль для основной цены покупки */
        .price-row.main-price {
            background: rgba(229, 27, 36, 0.1);
            border-left: 4px solid #e51b24;
        }

        /* Стиль для слива в гос */
        .price-row.gos-price {
            background: rgba(114, 118, 141, 0.1);
            border-left: 4px solid #72768d;
        }

        .price-label {
            font-size: 12px;
            color: #a3a7c2;
        }

        .price-value {
            font-size: 15px;
            font-weight: bold;
        }

        .main-price .price-value {
            color: #ffffff;
            font-size: 17px;
        }

        .gos-price .price-value {
            color: #b0b4cc;
        }
    </style>
</head>
<body>

    <h1>Автосалон InterPlay — Каталог</h1>
    
    <div id="loader">Загрузка автопарка...</div>
    <div class="catalog-container" id="catalog"></div>

    <script>
        // Твой ID таблицы со скриншота
const SPREADSHEET_ID = '1IFuVKUjeH_ebP5Djnx9egafM5sj58aLMuRLRafjn8kc';
// Запрашиваем стабильный CSV формат выгрузки
const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/pub?output=csv`;

fetch(url)
    .then(res => {
        if (!res.ok) throw new Error('Сетевая ошибка');
        return res.text();
    })
    .then(csvText => {
        const rows = parseCSV(csvText);
        
        const catalog = document.getElementById('catalog');
        document.getElementById('loader').style.display = 'none';

        // Начинаем со 2-й строчки (индекс 1), так как первая — заголовки
        for (let i = 1; i < rows.length; i++) {
            const cells = rows[i];
            if (cells.length < 11 || !cells[0]) continue; 

            const name = cells[0].trim();
            const realName = cells[1].trim();
            const carClass = cells[2].trim();
            const speed = cells[3].trim();
            const acceleration = cells[4].trim();
            const handling = cells[5].trim();
            const slots = cells[6].trim();
            const tank = cells[7].trim();
            const fuelConsumption = cells[8].trim();
            const dealership = cells[9].trim();
            let price = cells[10].trim();
            let gosPrice = cells[11] ? cells[11].trim() : '0';

            // --- ЛОГИКА ОПРЕДЕЛЕНИЯ ВАЛЮТЫ ---
            let isPremiumCurrency = false;
            
            // Проверяем, содержит ли цена упоминание коинов (IC coin, MC, донат и т.д.)
            if (price.toLowerCase().includes('coin') || price.toLowerCase().includes('ic')) {
                isPremiumCurrency = true;
                // Оставляем текст цены как есть (например, "4 600(IC coin)"), значок $ добавлять не будем
                price = price; 
            } else {
                // Если это обычная цена, добавляем пробел и знак доллара
                price = price + ' $';
            }

            // То же самое проверяем для слива в гос
            if (gosPrice.toLowerCase().includes('coin') || gosPrice.toLowerCase().includes('ic')) {
                gosPrice = gosPrice;
            } else {
                gosPrice = gosPrice + ' $';
            }
            // ---------------------------------

            const imgUrl = `https://via.placeholder.com/260x140/0f101a/ffffff?text=${encodeURIComponent(name)}`;

            const card = document.createElement('div');
            card.className = 'car-card';
            
            // Если машина за коины — сделаем ей красивую неоновую рамку, чтобы выделить
            if (isPremiumCurrency) {
                card.style.borderColor = '#9c27b0'; // Фиолетовый премиум-цвет
            }

            card.innerHTML = `
                <div class="car-image">
                    <img src="${imgUrl}" alt="${name}">
                    <div class="badge" style="${isPremiumCurrency ? 'background-color: #9c27b0;' : ''}">${carClass}</div>
                </div>
                <div class="car-info">
                    <div class="car-name">${name}</div>
                    <div class="real-name">${realName}</div>
                    <div class="dealership">📍 ${dealership}</div>
                    
                    <div class="car-specs">
                        <div class="spec-item">⚡ Скор: ${speed}</div>
                        <div class="spec-item">🚀 Ускор: ${acceleration}</div>
                        <div class="spec-item">🕹️ Управл: ${handling}</div>
                        <div class="spec-item">🎒 Багаж: ${slots} сл.</div>
                        <div class="spec-item">⛽ Бак: ${tank}</div>
                        <div class="spec-item">📉 Расход: ${fuelConsumption}</div>
                    </div>

                    <div class="price-container">
                        <div class="price-row main-price" style="${isPremiumCurrency ? 'border-left-color: #9c27b0; background: rgba(156, 39, 176, 0.1);' : ''}">
                            <span class="price-label">Цена в салоне:</span>
                            <span class="price-value" style="${isPremiumCurrency ? 'color: #e040fb;' : ''}">${price}</span>
                        </div>
                        <div class="price-row gos-price">
                            <span class="price-label">Слив в гос:</span>
                            <span class="price-value">${gosPrice}</span>
                        </div>
                    </div>
                </div>
            `;
            catalog.appendChild(card);
        }
    })
    .catch(err => {
        console.error(err);
        document.getElementById('loader').innerText = 'Ошибка загрузки данных. Убедитесь, что таблица Опубликована в интернете.';
    });

// Функция для правильного разбора CSV формата
function parseCSV(text) {
    let p = '', r = [];
    let q = false;
    let row = [''];
    for (let i=0; i<text.length; i++) {
        let c = text[i];
        if (c === '"') {
            q = !q;
        } else if (c === ',' && !q) {
            row.push('');
        } else if ((c === '\r' || c === '\n') && !q) {
            if (c === '\r' && text[i+1] === '\n') { i++; }
            r.push(row);
            row = [''];
        } else {
            row[row.length-1] += c;
        }
    }
    if (row.length > 1 || row[0] !== '') r.push(row);
    return r;
}
