<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автосалон InterPlay</title>
    <style>
        body {
            background-color: #0b0c16;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #e51b24;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 28px;
        }

        /* Поисковая строка */
        .search-container {
            max-width: 500px;
            margin: 0 auto 35px auto;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            background-color: #141622;
            border: 2px solid #222538;
            border-radius: 30px;
            color: #ffffff;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-input:focus {
            border-color: #e51b24;
            box-shadow: 0 0 12px rgba(229, 27, 36, 0.3);
        }

        .search-input::placeholder {
            color: #72768d;
        }

        #loader {
            text-align: center;
            font-size: 18px;
            color: #72768d;
            margin-top: 50px;
        }

        /* Контейнер каталога */
        .catalog-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Карточка в стиле Fletcher Wiki */
        .car-card {
            background-color: #141622;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
            border: 2px solid #222538;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .car-card.hidden {
            display: none !important;
        }

        .car-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(229, 27, 36, 0.25);
            border-color: #e51b24;
        }

        /* Премиум карточка (за коины) */
        .car-card.premium-card {
            border-color: #9c27b0;
        }
        .car-card.premium-card:hover {
            box-shadow: 0 12px 24px rgba(156, 39, 176, 0.35);
            border-color: #e040fb;
        }

        .car-image {
            width: 100%;
            height: 180px;
            background-color: #0f101a;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .car-image img {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
        }

        /* Бейдж класса автомобиля */
        .badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background-color: #e51b24;
            color: white;
            padding: 5px 12px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .premium-card .badge {
            background-color: #9c27b0;
        }

        .car-info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .car-name {
            font-size: 22px;
            font-weight: bold;
            margin: 0 0 3px 0;
            letter-spacing: 0.3px;
        }

        .real-name-label {
            font-size: 12px;
            color: #72768d;
            margin: 0;
        }

        .real-name {
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            margin: 0 0 8px 0;
        }

        .dealership {
            font-size: 13px;
            color: #ff9800;
            margin-bottom: 15px;
            font-weight: 600;
        }

        /* Параметры ТС */
        .car-specs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 13px;
            color: #a3a7c2;
            margin-bottom: 20px;
            background: #1c1e2f;
            padding: 12px;
            border-radius: 10px;
        }

        .spec-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Блок цен */
        .price-container {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            border-radius: 8px;
        }

        .price-row.main-price {
            background: rgba(229, 27, 36, 0.1);
            border-left: 4px solid #e51b24;
        }

        .premium-card .price-row.main-price {
            background: rgba(156, 39, 176, 0.15);
            border-left: 4px solid #9c27b0;
        }

        .price-row.gos-price {
            background: rgba(114, 118, 141, 0.1);
            border-left: 4px solid #56596e;
        }

        .price-label {
            font-size: 11px;
            color: #a3a7c2;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .price-value {
            font-size: 16px;
            font-weight: bold;
        }

        .main-price .price-value {
            color: #ffffff;
        }

        .premium-card .main-price .price-value {
            color: #e040fb;
        }

        .gos-price .price-value {
            color: #b0b4cc;
        }
    </style>
</head>
<body>

    <h1>Автосалон InterPlay — Каталог</h1>
    
    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="Введите название автомобиля...">
    </div>
    
    <div id="loader">Загрузка автопарка...</div>
    <div class="catalog-container" id="catalog"></div>

    <script>
        const SPREADSHEET_ID = '1IFuVKUjeH_ebP5Djnx9egafM5sj58aLMuRLRafjn8kc';
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/pub?output=csv`;

        let allCars = [];

        fetch(url)
            .then(res => {
                if (!res.ok) throw new Error('Сетевой сбой при чтении');
                return res.text();
            })
            .then(csvText => {
                const rows = parseCSV(csvText);
                
                const catalog = document.getElementById('catalog');
                document.getElementById('loader').style.display = 'none';

                for (let i = 1; i < rows.length; i++) {
                    const cells = rows[i];
                    if (!cells || cells.length < 11 || !cells[0]) continue; 

                    const name = cells[0].trim();              
                    const realName = cells[1].trim();          
                    const carClass = cells[2].trim();          
                    const speed = cells[3].trim();             
                    const acceleration = cells[4].trim();      
                    const handling = cells[5].trim();          
                    const slots = cells[6].trim();             
                    const tank = cells[7].trim();              
                    const fuelConsumption = cells[8].trim();   
                    const dealership = cells[9].trim();        
                    let price = cells[10].trim();              
                    let gosPrice = cells[11] ? cells[11].trim() : '0'; 

                    if (price === '' || price === '0') price = 'Не продается';

                    // Определение валюты (Коины / Доллары)
                    let isPremiumCurrency = false;
                    const checkPrice = price.toLowerCase();
                    
                    if (checkPrice.includes('coin') || checkPrice.includes('ic') || checkPrice.includes('кои') || checkPrice.includes('mc')) {
                        isPremiumCurrency = true;
                    } else if (price !== 'Не продается') {
                        price = price + ' $';
                    }

                    const checkGos = gosPrice.toLowerCase();
                    if (!checkGos.includes('coin') && !checkGos.includes('ic') && !checkGos.includes('кои') && gosPrice !== '0' && gosPrice !== '') {
                        gosPrice = gosPrice + ' $';
                    }

                    // Временная заглушка под фото машин
                    const imgUrl = `https://via.placeholder.com/260x140/0f101a/ffffff?text=${encodeURIComponent(name)}`;

                    const card = document.createElement('div');
                    card.className = 'car-card';
                    if (isPremiumCurrency) {
                        card.classList.add('premium-card');
                    }

                    card.innerHTML = `
                        <div class="car-image">
                            <img src="${imgUrl}" alt="${name}">
                            <div class="badge">${carClass}</div>
                        </div>
                        <div class="car-info">
                            <div class="car-name">${name}</div>
                            <p class="real-name-label">Реальное название</p>
                            <div class="real-name">${realName ? realName : '—'}</div>
                            <div class="dealership">📍 ${dealership}</div>
                            
                            <div class="car-specs">
                                <div class="spec-item">⚡ Скор: ${speed}</div>
                                <div class="spec-item">🚀 Ускор: ${acceleration}</div>
                                <div class="spec-item">🕹️ Управл: ${handling}</div>
                                <div class="spec-item">🎒 Багаж: ${slots}</div>
                                <div class="spec-item">⛽ Бак: ${tank}</div>
                                <div class="spec-item">📉 Расход: ${fuelConsumption}</div>
                            </div>

                            <div class="price-container">
                                <div class="price-row main-price">
                                    <span class="price-label">Цена в салоне:</span>
                                    <span class="price-value">${price}</span>
                                </div>
                                <div class="price-row gos-price">
                                    <span class="price-label">Слив в гос:</span>
                                    <span class="price-value">${gosPrice}</span>
                                </div>
                            </div>
                        </div>
                    `;
                    catalog.appendChild(card);

                    allCars.push({
                        element: card,
                        name: name.toLowerCase(),
                        realName: realName.toLowerCase()
                    });
                }
            })
            .catch(err => {
                console.error(err);
                document.getElementById('loader').innerHTML = 'Ошибка загрузки данных.<br><small style="color:#ef5350;">Выполните Шаг 1: Файл -> Поделиться -> Опубликовать в интернете -> Лист1 (CSV)</small>';
            });

        // Живой поиск
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', function(e) {
            const query = e.target.value.trim().toLowerCase();
            allCars.forEach(car => {
                if (car.name.includes(query) || car.realName.includes(query)) {
                    car.element.classList.remove('hidden');
                } else {
                    car.element.classList.add('hidden');
                }
            });
        });

        // Парсер CSV
        function parseCSV(text) {
            let lines = text.split(/\r\n|\n/);
            let result = [];
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (!line) continue;
                
                let row = [];
                let inQuotes = false;
                let currentCell = '';
                
                for (let j = 0; j < line.length; j++) {
                    let char = line[j];
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        row.push(currentCell);
                        currentCell = '';
                    } else {
                        currentCell += char;
                    }
                }
                row.push(currentCell);
                result.push(row);
            }
            return result;
        }
    </script>
</body>
</html>
