<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автосалон InterPlay — Каталог</title>
    <style>
        body {
            background-color: #171a21;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Шапка каталога */
        .header-main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 35px;
            padding-top: 10px;
        }

        .header-logo {
            width: 150px;
            height: auto;
            margin-bottom: 15px;
            object-fit: contain;
        }

        .header-main h1 {
            text-align: center;
            color: #ffffff;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 26px;
            font-weight: 700;
        }
        
        .header-main h1 span {
            color: #8c2d32;
        }

        /* Панель фильтров */
        .filters-panel {
            background-color: #1e222b;
            border: 1px solid #2b313e;
            border-radius: 12px;
            padding: 22px;
            max-width: 1360px;
            margin: 0 auto 30px auto;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.25);
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .filters-grid:last-child {
            margin-bottom: 0;
        }

        .filter-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-item label {
            font-size: 11px;
            color: #838b99;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.8px;
        }

        /* Поля ввода и селекты */
        .filter-select, .search-input {
            width: 100%;
            padding: 11px 14px;
            background-color: #15181e;
            border: 1px solid #2b313e;
            border-radius: 6px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .filter-select:focus, .search-input:focus {
            border-color: #8c2d32;
            box-shadow: 0 0 0 2px rgba(140, 45, 50, 0.2);
        }

        /* Контейнер для полей От и До */
        .range-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Убираем стрелочки внутри полей ввода числового типа */
        .range-container input::-webkit-outer-spin-button,
        .range-container input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        #loader {
            text-align: center;
            font-size: 16px;
            color: #626975;
            margin-top: 50px;
            line-height: 1.6;
        }

        .error-hint {
            color: #8c2d32;
            font-weight: 600;
            margin-top: 10px;
            font-size: 14px;
        }

        /* Сетка каталога */
        .catalog-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Карточки автомобилей */
        .car-card {
            background-color: #1e222b;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid #2b313e;
            display: flex;
            flex-direction: column;
        }

        .car-card.hidden {
            display: none !important;
        }

        .car-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.4);
            border-color: #434b59;
        }

        /* Премиум рамка для транспорта за коины */
        .car-card.premium-card {
            border-color: rgba(242, 142, 83, 0.3);
        }
        .car-card.premium-card:hover {
            border-color: #f28e53;
            box-shadow: 0 10px 22px rgba(242, 142, 83, 0.15);
        }

        .car-image {
            width: 100%;
            height: 180px;
            background-color: #13161c;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-bottom: 1px solid #2b313e;
        }

        .car-image img {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
        }

        /* Название класса машины */
        .badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background-color: #2b313e;
            color: #cbd3e0;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 4px;
            text-transform: uppercase;
            border: 1px solid #3f4756;
        }

        .car-info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .car-name {
            font-size: 22px;
            font-weight: 700;
            margin: 0 0 4px 0;
            color: #ffffff;
        }

        .real-name-label {
            font-size: 11px;
            color: #626975;
            margin: 0;
            text-transform: uppercase;
            font-weight: 600;
        }

        .real-name {
            color: #98a2b3;
            font-size: 14px;
            font-weight: 500;
            margin: 0 0 12px 0;
        }

        .dealership {
            font-size: 13px;
            color: #8c2d32;
            margin-bottom: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Технические характеристики */
        .car-specs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 13px;
            color: #98a2b3;
            margin-bottom: 20px;
            background: #15181e;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #2b313e;
        }

        .spec-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Цены */
        .price-container {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            border-radius: 6px;
            border: 1px solid #2b313e;
            background: #15181e;
        }

        .price-row.main-price {
            background: rgba(140, 45, 50, 0.08);
            border-left: 3px solid #8c2d32;
            border-color: rgba(140, 45, 50, 0.25) rgba(140, 45, 50, 0.25) rgba(140, 45, 50, 0.25) #8c2d32;
        }

        .premium-card .price-row.main-price {
            background: rgba(242, 142, 83, 0.06);
            border-left: 3px solid #f28e53;
            border-color: rgba(242, 142, 83, 0.2) rgba(242, 142, 83, 0.2) rgba(242, 142, 83, 0.2) #f28e53;
        }

        .price-label {
            font-size: 11px;
            color: #838b99;
            text-transform: uppercase;
            font-weight: 700;
        }

        .price-value {
            font-size: 15px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* Иконка IC коина */
        .coin-img {
            width: 18px;
            height: 18px;
            object-fit: contain;
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <div class="header-main">
        <img class="header-logo" src="logo.png" alt="InterPlay RP">
        <h1>INTERPLAY <span>RP</span> — КАТАЛОГ</h1>
    </div>
    
    <div class="filters-panel">
        <div class="filters-grid">
            <div class="filter-item">
                <label>Поиск транспорта</label>
                <input type="text" id="searchInput" class="search-input" placeholder="Введите название...">
            </div>

            <div class="filter-item">
                <label>Автосалон</label>
                <select id="dealerFilter" class="filter-select">
                    <option value="all">Все автосалоны</option>
                </select>
            </div>

            <div class="filter-item">
                <label>Сортировка</label>
                <select id="sortFilter" class="filter-select">
                    <option value="none">Без сортировки</option>
                    <option value="alpha-asc">Алфавит: А -> Я</option>
                    <option value="alpha-desc">Алфавит: Я -> А</option>
                    <option value="price-asc">Цена: По возрастанию</option>
                    <option value="price-desc">Цена: По убыванию</option>
                    <option value="gos-asc">Гос. цена: По возрастанию</option>
                    <option value="gos-desc">Гос. цена: По убыванию</option>
                </select>
            </div>

            <div class="filter-item">
                <label>Вместимость багажника</label>
                <select id="baggageFilter" class="filter-select">
                    <option value="all">Любой багажник</option>
                </select>
            </div>

            <div class="filter-item">
                <label>Топливный бак</label>
                <select id="tankFilter" class="filter-select">
                    <option value="all">Любой объём</option>
                </select>
            </div>
        </div>

        <div class="filters-grid">
            <div class="filter-item">
                <label>Максимальная скорость (км/ч)</label>
                <div class="range-container">
                    <input type="number" id="speedFrom" class="search-input" placeholder="От">
                    <input type="number" id="speedTo" class="search-input" placeholder="До">
                </div>
            </div>

            <div class="filter-item">
                <label>Цена салона ($)</label>
                <div class="range-container">
                    <input type="number" id="priceFrom" class="search-input" placeholder="От">
                    <input type="number" id="priceTo" class="search-input" placeholder="До">
                </div>
            </div>
        </div>
    </div>
    
    <div id="loader">Загрузка базы данных машин...</div>
    <div class="catalog-container" id="catalog"></div>

    <script>
        const SPREADSHEET_ID = '1IFuVKUjeH_ebP5Djnx9egafM5sj58aLMuRLRafjn8kc';
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0`;

        let allCars = [];

        const searchInput = document.getElementById('searchInput');
        const dealerFilter = document.getElementById('dealerFilter');
        const sortFilter = document.getElementById('sortFilter');
        const baggageFilter = document.getElementById('baggageFilter');
        const tankFilter = document.getElementById('tankFilter');
        
        const speedFrom = document.getElementById('speedFrom');
        const speedTo = document.getElementById('speedTo');
        const priceFrom = document.getElementById('priceFrom');
        const priceTo = document.getElementById('priceTo');

        const COIN_IMG_HTML = `<img src="coin.png" class="coin-img" alt="Coin">`;

        function cleanPrice(priceRaw) {
            let str = priceRaw.trim();
            if (!str || str === '0' || str.toLowerCase() === 'не продается') return 0;
            if (str.includes(',')) str = str.split(',')[0];
            if (str.includes('.')) str = str.split('.')[0];
            return parseInt(str.replace(/[^0-9]/g, '')) || 0;
        }

        function formatPriceHTML(priceStr, cleanNum) {
            const lower = priceStr.toLowerCase();
            if (lower === 'не продается') return `<span>Не продается</span>`;
            
            if (lower.includes('coin') || lower.includes('ic') || lower.includes('кои') || lower.includes('mc')) {
                return `${COIN_IMG_HTML} <span style="color: #f28e53;">${cleanNum.toLocaleString('ru-RU')}</span>`;
            }
            
            return `<span>${cleanNum.toLocaleString('ru-RU')} $</span>`;
        }

        fetch(url)
            .then(res => {
                if (!res.ok) throw new Error('Ошибка сети');
                return res.text();
            })
            .then(csvText => {
                if (csvText.includes('<!DOCTYPE html>') || csvText.includes('login') || csvText.includes('google-signin')) {
                    throw new Error('Доступ ограничен (CORS / Авторизация)');
                }

                const rows = parseCSV(csvText);
                document.getElementById('loader').style.display = 'none';

                const dealerships = new Set();
                const baggageCaps = new Set();
                const tankCaps = new Set();
                let maxTableSpeed = 0;
                let maxTablePrice = 0;

                for (let i = 1; i < rows.length; i++) {
                    const cells = rows[i];
                    if (!cells || cells.length < 11 || !cells[0]) continue; 

                    const name = cells[0].trim();              
                    const realName = cells[1].trim();          
                    const carClass = cells[2].trim();          
                    const rawSpeed = cells[3].trim();             
                    const acceleration = cells[4].trim();      
                    const handling = cells[5].trim();          
                    const rawSlots = cells[6].trim();             
                    const rawTank = cells[7].trim();              
                    const fuelConsumption = cells[8].trim();   
                    const dealership = cells[9].trim();        
                    let priceStr = cells[10].trim();              
                    let gosPriceStr = cells[11] ? cells[11].trim() : '0'; 
                    
                    // Читаем ссылку из 13-й колонки (индекс 12)
                    const customImgUrl = cells[12] ? cells[12].trim() : '';

                    if (priceStr === '' || priceStr === '0') priceStr = 'Не продается';

                    const numSpeed = parseInt(rawSpeed.replace(/[^0-9]/g, '')) || 0;
                    const numSlots = parseInt(rawSlots.replace(/[^0-9]/g, '')) || 0;
                    const numTank = parseInt(rawTank.replace(/[^0-9]/g, '')) || 0;

                    if (numSpeed > maxTableSpeed) maxTableSpeed = numSpeed;

                    let isPremiumCurrency = false;
                    let numPrice = cleanPrice(priceStr);
                    
                    if (priceStr.toLowerCase().includes('coin') || priceStr.toLowerCase().includes('ic') || priceStr.toLowerCase().includes('кои') || priceStr.toLowerCase().includes('mc')) {
                        isPremiumCurrency = true;
                    } else if (priceStr !== 'Не продается') {
                        if (numPrice > maxTablePrice) maxTablePrice = numPrice;
                    }

                    let numGosPrice = cleanPrice(gosPriceStr);

                    if (dealership) dealerships.add(dealership);
                    if (rawSlots) baggageCaps.add(numSlots);
                    if (rawTank) tankCaps.add(numTank);

                    const priceHTML = formatPriceHTML(priceStr, numPrice);
                    const gosPriceHTML = formatPriceHTML(gosPriceStr, numGosPrice);

                    // Если в таблице есть ссылка — подставляем её. Если пусто — оставляем серый квадрат
                    const imgUrl = customImgUrl ? customImgUrl : `https://dummyimage.com/600x400/13161c/ffffff.png&text=${encodeURIComponent(name)}`;
                    
                    const card = document.createElement('div');
                    card.className = 'car-card';
                    if (isPremiumCurrency) card.classList.add('premium-card');

                    card.innerHTML = `
                        <div class="car-image">
                            <img src="${imgUrl}" alt="${name}">
                            <div class="badge">${carClass}</div>
                        </div>
                        <div class="car-info">
                            <div class="car-name">${name}</div>
                            <p class="real-name-label">Реальное название</p>
                            <div class="real-name">${realName ? realName : '—'}</div>
                            <div class="dealership">📍 ${dealership}</div>
                            
                            <div class="car-specs">
                                <div class="spec-item">⚡ Скор: ${rawSpeed}</div>
                                <div class="spec-item">🚀 Ускор: ${acceleration}</div>
                                <div class="spec-item">🕹️ Управл: ${handling}</div>
                                <div class="spec-item">🎒 Багаж: ${rawSlots}</div>
                                <div class="spec-item">⛽ Бак: ${rawTank}</div>
                                <div class="spec-item">📉 Расход: ${fuelConsumption}</div>
                            </div>

                            <div class="price-container">
                                <div class="price-row main-price">
                                    <span class="price-label">Цена в салоне:</span>
                                    <span class="price-value">${priceHTML}</span>
                                </div>
                                <div class="price-row gos-price">
                                    <span class="price-label">Слив в гос:</span>
                                    <span class="price-value">${gosPriceHTML}</span>
                                </div>
                            </div>
                        </div>
                    `;

                    allCars.push({
                        element: card,
                        name: name.toLowerCase(),
                        realName: realName.toLowerCase(),
                        dealer: dealership,
                        speed: numSpeed,
                        baggage: numSlots,
                        tank: numTank,
                        price: numPrice,
                        gosPrice: numGosPrice,
                        isPremium: isPremiumCurrency
                    });
                }

                setupFilterOptions(dealerships, baggageCaps, tankCaps, maxTableSpeed, maxTablePrice);
                renderCatalog();
            })
            .catch(err => {
                console.error(err);
                document.getElementById('loader').innerHTML = `
                    <div class="error-hint">Ошибка загрузки базы данных транспорта.</div>
                `;
            });

        function setupFilterOptions(dealers, baggage, tanks, maxSpeed, maxPrice) {
            Array.from(dealers).sort().forEach(d => {
                dealerFilter.innerHTML += `<option value="${d}">${d}</option>`;
            });
            Array.from(baggage).sort((a,b)=>a-b).forEach(b => {
                baggageFilter.innerHTML += `<option value="${b}">${b} кг / слот</option>`;
            });
            Array.from(tanks).sort((a,b)=>a-b).forEach(t => {
                tankFilter.innerHTML += `<option value="${t}">${t} л</option>`;
            });
        }

        [searchInput, dealerFilter, sortFilter, baggageFilter, tankFilter, speedFrom, speedTo, priceFrom, priceTo].forEach(el => {
            el.addEventListener('input', renderCatalog);
        });

        function renderCatalog() {
            const query = searchInput.value.trim().toLowerCase();
            const selectedDealer = dealerFilter.value;
            const selectedBaggage = baggageFilter.value;
            const selectedTank = tankFilter.value;
            
            const minSpeed = parseInt(speedFrom.value) || 0;
            const maxSpeed = parseInt(speedTo.value) || 999999;
            const minPrice = parseInt(priceFrom.value) || 0;
            const maxPrice = parseInt(priceTo.value) || 999999999;
            
            const sortType = sortFilter.value;

            allCars.forEach(car => {
                const matchesSearch = car.name.includes(query) || car.realName.includes(query);
                const matchesDealer = selectedDealer === 'all' || car.dealer === selectedDealer;
                const matchesBaggage = selectedBaggage === 'all' || car.baggage === parseInt(selectedBaggage);
                const matchesTank = selectedTank === 'all' || car.tank === parseInt(selectedTank);
                
                const matchesSpeed = car.speed >= minSpeed && car.speed <= maxSpeed;
                const matchesPrice = car.isPremium || car.price === 0 || (car.price >= minPrice && car.price <= maxPrice);

                if (matchesSearch && matchesDealer && matchesBaggage && matchesTank && matchesSpeed && matchesPrice) {
                    car.element.classList.remove('hidden');
                } else {
                    car.element.classList.add('hidden');
                }
            });

            let sortedCars = [...allCars];

            if (sortType === 'alpha-asc') {
                sortedCars.sort((a, b) => a.name.localeCompare(b.name));
            } else if (sortType === 'alpha-desc') {
                sortedCars.sort((a, b) => b.name.localeCompare(a.name));
            } else if (sortType === 'price-asc') {
                sortedCars.sort((a, b) => a.price - b.price);
            } else if (sortType === 'price-desc') {
                sortedCars.sort((a, b) => b.price - a.price);
            } else if (sortType === 'gos-asc') {
                sortedCars.sort((a, b) => a.gosPrice - b.gosPrice);
            } else if (sortType === 'gos-desc') {
                sortedCars.sort((a, b) => b.gosPrice - a.gosPrice);
            }

            const catalog = document.getElementById('catalog');
            sortedCars.forEach(car => catalog.appendChild(car.element));
        }

        function parseCSV(text) {
            let lines = text.split(/\r\n|\n/);
            let result = [];
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (!line) continue;
                
                let row = [];
                let inQuotes = false;
                let currentCell = '';
                
                for (let j = 0; j < line.length; j++) {
                    let char = line[j];
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        row.push(currentCell);
                        currentCell = '';
                    } else {
                        currentCell += char;
                    }
                }
                row.push(currentCell);
                result.push(row);
            }
            return result;
        }
    </script>
</body>
</html>
